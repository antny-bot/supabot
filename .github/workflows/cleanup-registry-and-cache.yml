name: Cleanup Registry and Cache

on:
  schedule:
    - cron: '25 18 * * 0'
  workflow_dispatch:
    inputs:
      keep_versions:
        description: Number of GHCR versions to keep per package
        required: true
        default: '5'
      cleanup_caches:
        description: Delete all GitHub Actions caches after package cleanup
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  cleanup-ghcr:
    name: Cleanup GHCR (${{ matrix.package_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package_name:
          - supabot
          - supabot-manager
    steps:
      - name: Delete old GHCR versions
        uses: actions/github-script@v7
        env:
          KEEP_VERSIONS: ${{ github.event.inputs.keep_versions || '5' }}
          PACKAGE_NAME: ${{ matrix.package_name }}
        with:
          script: |
            const owner = context.repo.owner;
            const packageType = 'container';
            const packageName = process.env.PACKAGE_NAME;
            const keepVersions = Number(process.env.KEEP_VERSIONS || '5');

            if (!Number.isInteger(keepVersions) || keepVersions < 1) {
              core.setFailed(`keep_versions must be an integer >= 1. Received: ${process.env.KEEP_VERSIONS}`);
              return;
            }

            async function listPackageVersions() {
              const endpoints = [
                `GET /orgs/${owner}/packages/${packageType}/${packageName}/versions`,
                `GET /users/${owner}/packages/${packageType}/${packageName}/versions`,
              ];

              for (const endpoint of endpoints) {
                try {
                  const versions = await github.paginate(endpoint, {
                    per_page: 100,
                  });
                  core.info(`Loaded ${versions.length} versions for ${packageName} via ${endpoint}.`);
                  return { endpoint, versions };
                } catch (error) {
                  core.info(`Could not load ${packageName} via ${endpoint}: ${error.message}`);
                }
              }

              throw new Error(`Unable to list package versions for ${packageName}.`);
            }

            async function deletePackageVersion(endpoint, versionId) {
              const deleteEndpoint = endpoint
                .replace('GET /', 'DELETE /')
                .replace('/versions', `/versions/${versionId}`);
              await github.request(deleteEndpoint);
            }

            function versionSummary(version) {
              const tags = (version.metadata?.container?.tags || []).join(', ') || '(untagged)';
              return `${version.id} [${tags}] created ${version.created_at}`;
            }

            const { endpoint, versions } = await listPackageVersions();
            const sortedVersions = [...versions].sort((left, right) => {
              return new Date(right.created_at) - new Date(left.created_at);
            });

            if (sortedVersions.length <= keepVersions) {
              core.info(
                `${packageName} has ${sortedVersions.length} versions. Nothing to delete because keep_versions=${keepVersions}.`
              );
              return;
            }

            const versionsToKeep = sortedVersions.slice(0, keepVersions);
            const versionsToDelete = sortedVersions.slice(keepVersions);

            core.info(`Keeping ${versionsToKeep.length} newest versions for ${packageName}:`);
            for (const version of versionsToKeep) {
              core.info(`KEEP ${versionSummary(version)}`);
            }

            core.info(`Deleting ${versionsToDelete.length} older versions for ${packageName}.`);
            for (const version of versionsToDelete) {
              core.info(`DELETE ${versionSummary(version)}`);
              await deletePackageVersion(endpoint, version.id);
            }

  cleanup-actions-cache:
    name: Cleanup Actions Cache
    runs-on: ubuntu-latest
    needs: cleanup-ghcr
    if: ${{ github.event_name == 'schedule' || inputs.cleanup_caches }}
    steps:
      - name: Delete GitHub Actions caches
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const caches = [];
            let page = 1;

            while (true) {
              const response = await github.request('GET /repos/{owner}/{repo}/actions/caches', {
                owner,
                repo,
                per_page: 100,
                page,
              });
              const pageCaches = response.data.actions_caches || [];
              caches.push(...pageCaches);
              if (pageCaches.length < 100) {
                break;
              }
              page += 1;
            }

            if (caches.length === 0) {
              core.info('No Actions caches found.');
              return;
            }

            core.info(`Deleting ${caches.length} Actions caches.`);
            for (const cache of caches) {
              core.info(`DELETE cache ${cache.id} key=${cache.key} ref=${cache.ref || '(none)'} size=${cache.size_in_bytes}`);
              await github.request('DELETE /repos/{owner}/{repo}/actions/caches/{cache_id}', {
                owner,
                repo,
                cache_id: cache.id,
              });
            }
