services:
  supabot:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
        GIT_SHA: ${GIT_SHA:-unknown}
    image: ghcr.io/antny-bot/supabot:latest
    container_name: supabot
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: Asia/Seoul
    volumes:
      - ./config/.env:/app/config/.env:ro
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json,time,sys;d=json.load(open('/app/data/health.json'));sys.exit(0 if time.time()-d['ts']<600 else 1)\" 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
