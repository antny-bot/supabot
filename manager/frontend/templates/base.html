<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>supabot manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .status-badge { font-size: .75rem; }
    .action-btn { font-size: .8rem; padding: .2rem .5rem; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <span class="navbar-brand">⚡ supabot manager</span>
    <div class="d-flex gap-3 align-items-center">
      <a href="/admin/dashboard" class="text-light text-decoration-none">대시보드</a>
      <a href="/admin/orders" class="text-light text-decoration-none">주문 현황</a>
      <a href="/admin/trades" class="text-light text-decoration-none">거래 내역</a>
      <a href="/admin/events" class="text-light text-decoration-none">이벤트 로그</a>
      <a href="/admin/users" class="text-light text-decoration-none">유저 관리</a>
      <a href="/admin/config" class="text-light text-decoration-none">시스템 설정</a>
      <a href="/logout" class="btn btn-outline-light btn-sm">로그아웃</a>
    </div>
  </div>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
