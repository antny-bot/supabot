{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="fw-bold mb-0">유저 관리</h5>
  <div class="d-flex gap-2">
    <a href="/admin/users" class="btn btn-sm {% if not status_filter %}btn-dark{% else %}btn-outline-dark{% endif %}">전체</a>
    {% for key, label in status_labels.items() %}
    <a href="/admin/users?status={{ key }}"
       class="btn btn-sm {% if status_filter == key %}btn-dark{% else %}btn-outline-secondary{% endif %}">
      {{ label }}
    </a>
    {% endfor %}
  </div>
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<div class="card shadow-sm">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th>유저 ID</th>
          <th>이름</th>
          <th>상태</th>
          <th>관리자</th>
          <th>가입일</th>
          <th>액션</th>
        </tr>
      </thead>
      <tbody id="user-table-body">
        {% for user in users %}
        {% include "user_row.html" %}
        {% else %}
        <tr><td colspan="6" class="text-center text-muted py-4">유저 없음</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
